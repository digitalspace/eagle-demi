# =============================================================================
# Build and Deploy DEMI to Azure Dev
# =============================================================================
# Triggered on push to main branch (when azure or application files change) or
# workflow_dispatch. Provisions Bicep IaC with DEMI tags, deploys Angular frontend
# to Azure Static Web Apps, and deploys Node.js API to Azure Functions.
# =============================================================================

name: Deploy DEMI to Azure Dev

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'api/**'
      - 'frontend/**'
      - 'azure/**'
      - 'host.json'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/azure-deploy-dev.yaml'
  workflow_dispatch:

concurrency:
  group: deploy-azure-dev
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: 'd2f8d048-2af3-44fd-81cc-858c040001f2' # c4b0a8-dev - EPIC.AI
  AZURE_RESOURCE_GROUP: 'c4b0a8-dev-rg'
  LOCATION: 'canadacentral'

jobs:
  deploy-infra:
    name: Provision Infrastructure (Bicep)
    if: ${{ secrets.AZURE_CREDENTIALS != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Create Resource Group if not exists
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create --name ${{ env.AZURE_RESOURCE_GROUP }} --location ${{ env.LOCATION }} --tags Project=DEMI Application=eagle-demi Environment=dev CostCenter=c4b0a8

      - name: Deploy Bicep IaC
        uses: azure/arm-deploy@v1
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: ./azure/main.bicep
          parameters: ./azure/main.bicepparam

  deploy-frontend:
    name: Build & Deploy Frontend (Static Web Apps)
    needs: deploy-infra
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & Build Frontend
        run: |
          cd frontend
          corepack enable
          yarn install --immutable
          yarn build --configuration production

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          app_location: '/frontend'
          output_location: 'dist/frontend'
          action: 'upload'

  deploy-api:
    name: Deploy API (Azure Functions)
    needs: deploy-infra
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies & Build API
        run: |
          corepack enable
          yarn install --immutable

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: demi-api-dev
          package: '.'
