# =============================================================================
# Build and Deploy DEMI to Azure Dev
# =============================================================================
# Triggered on push to main branch (when azure or application files change) or
# workflow_dispatch. Provisions Bicep IaC with DEMI tags, deploys Angular frontend
# to Azure Web App, and deploys Node.js API to Azure Functions.
# =============================================================================

name: Deploy DEMI to Azure Dev

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'api/**'
      - 'frontend/**'
      - 'azure/**'
      - 'host.json'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/azure-deploy-dev.yaml'
  workflow_dispatch:

concurrency:
  group: deploy-azure-dev
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AZURE_SUBSCRIPTION_ID: 'd2f8d048-2af3-44fd-81cc-858c040001f2' # c4b0a8-dev - EPIC.AI
  AZURE_RESOURCE_GROUP: 'c4b0a8-dev-rg'
  LOCATION: 'canadacentral'

jobs:
  deploy-infra:
    name: Provision Infrastructure (Bicep)
    if: ${{ secrets.AZURE_CREDENTIALS != '' || secrets.AZURE_CLIENT_ID != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      - name: Validate Bicep Template
        run: |
          az bicep build --file ./azure/main.bicep

      - name: Create Resource Group if not exists
        uses: azure/cli@v2
        with:
          inlineScript: |
            az group create --name ${{ env.AZURE_RESOURCE_GROUP }} --location ${{ env.LOCATION }} --tags Project=DEMI Application=eagle-demi Environment=dev CostCenter=c4b0a8 ManagedBy=Bicep

      - name: Deploy Bicep IaC
        uses: azure/arm-deploy@v1
        with:
          scope: resourcegroup
          resourceGroupName: ${{ env.AZURE_RESOURCE_GROUP }}
          template: ./azure/main.bicep
          parameters: ./azure/main.bicepparam minioAccessKey="${{ secrets.MINIO_ACCESS_KEY || 'minio' }}" minioSecretKey="${{ secrets.MINIO_SECRET_KEY || 'minio123' }}" typesenseApiKey="${{ secrets.TYPESENSE_API_KEY || 'demi-typesense-dev-key' }}"


  deploy-frontend:
    name: Build & Deploy Frontend (Azure Static Web App)
    needs: deploy-infra
    if: always() && !cancelled() && !contains(needs.*.result, 'failure') && (secrets.AZURE_CREDENTIALS != '' || secrets.AZURE_CLIENT_ID != '')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install & Build Frontend
        run: |
          cd frontend
          corepack enable
          yarn install --immutable
          yarn build --configuration production

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      - name: Fetch Static Web App Deployment Token
        id: get-swa-token
        uses: azure/cli@v2
        with:
          inlineScript: |
            TOKEN=$(az staticwebapp secrets list --name demi-frontend-dev --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query "properties.apiKey" -o tsv 2>/dev/null || echo "")
            echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Deploy Frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN || steps.get-swa-token.outputs.token }}
          app_location: 'frontend'
          output_location: 'dist'
          action: 'upload'


  deploy-api:
    name: Deploy API (Azure Functions)
    needs: deploy-infra
    if: always() && !cancelled() && !contains(needs.*.result, 'failure') && (secrets.AZURE_CREDENTIALS != '' || secrets.AZURE_CLIENT_ID != '')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies & Build API
        run: |
          corepack enable
          yarn install --immutable

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}
          creds: ${{ secrets.AZURE_CREDENTIALS }}
          allow-no-subscriptions: true

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: demi-api-dev
          package: '.'

