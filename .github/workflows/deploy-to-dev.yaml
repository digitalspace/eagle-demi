# =============================================================================
# Build and Deploy to Dev
# =============================================================================
# Triggered on push to main branch (excluding docs/CI-only changes).
# Builds the unified Node.js API and worker image, pushes to GHCR,
# and deploys/upgrades the Helm release in 6cdc9e-dev namespace.
# =============================================================================

name: Build and Deploy to Dev

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  OPENSHIFT_NAMESPACE_DEV: 6cdc9e-dev
  HELM_RELEASE: eagle-demi
  REGISTRY: ghcr.io
  IMAGE_NAME: digitalspace/eagle-demi-api

jobs:
  build:
    name: Build & Push Node Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      SHORT_SHA: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          TAG="${{ github.sha }}"
          TAG="${TAG:0:7}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.image }}:latest
            ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    name: Deploy to Dev
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install OpenShift CLI
        run: |
          curl -LO "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-client-linux.tar.gz"
          tar -xvzf openshift-client-linux.tar.gz
          sudo mv oc /usr/local/bin/
          rm -f openshift-client-linux.tar.gz

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Log into OpenShift
        run: oc login --token=${{ secrets.OPENSHIFT_TOKEN }} --server=${{ secrets.OPENSHIFT_URL }}

      - name: Deploy with Helm
        run: |
          STATUS=$(helm status ${{ env.HELM_RELEASE }} -n ${{ env.OPENSHIFT_NAMESPACE_DEV }} -o json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('info',{}).get('status',''))" 2>/dev/null || echo "")
          if [[ "$STATUS" == "pending-upgrade" || "$STATUS" == "pending-install" ]]; then
            echo "Release stuck in $STATUS — rolling back before upgrade"
            helm rollback ${{ env.HELM_RELEASE }} -n ${{ env.OPENSHIFT_NAMESPACE_DEV }} || true
          fi
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm \
            --namespace ${{ env.OPENSHIFT_NAMESPACE_DEV }} \
            --values ./helm/values-dev.yaml \
            --set api.image.tag=${{ needs.build.outputs.SHORT_SHA }} \
            --set worker.image.tag=${{ needs.build.outputs.SHORT_SHA }} \
            --wait --timeout=10m --cleanup-on-fail

      - name: Verify deployment
        run: |
          echo "Verifying eagle-demi-api deployment..."
          oc rollout status deployment/${{ env.HELM_RELEASE }}-api \
            -n ${{ env.OPENSHIFT_NAMESPACE_DEV }} --timeout=10m
          echo "✓ eagle-demi-api healthy"

          echo ""
          echo "Pods:"
          oc get pods -n ${{ env.OPENSHIFT_NAMESPACE_DEV }} \
            -l app.kubernetes.io/instance=${{ env.HELM_RELEASE }}
