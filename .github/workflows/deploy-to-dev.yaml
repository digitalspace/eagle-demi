# =============================================================================
# Build and Deploy to Dev
# =============================================================================
# Triggered on push to main branch or workflow_dispatch.
# Separately builds and pushes Node.js API (eagle-demi-api) and Angular frontend
# (eagle-demi-frontend) images, then deploys/upgrades the Helm release in 6cdc9e-dev.
# =============================================================================

name: Build and Deploy to Dev

on:
  push:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: deploy-dev
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  OPENSHIFT_NAMESPACE_DEV: 6cdc9e-dev
  HELM_RELEASE: eagle-demi
  REGISTRY: ghcr.io
  API_IMAGE_NAME: digitalspace/eagle-demi-api
  FRONTEND_IMAGE_NAME: digitalspace/eagle-demi-frontend

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api == 'true' || github.event_name == 'workflow_dispatch' }}
      frontend: ${{ steps.filter.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Filter changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'src/**'
              - 'package.json'
              - 'yarn.lock'
              - 'Dockerfile'
              - 'helm/**'
              - '.github/workflows/deploy-to-dev.yaml'
            frontend:
              - 'frontend/**'
              - 'helm/**'
              - '.github/workflows/deploy-to-dev.yaml'

  build-api:
    name: Build & Push API Image
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.api == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      SHORT_SHA: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          TAG="${{ github.sha }}"
          TAG="${TAG:0:7}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${{ env.API_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.image }}:latest
            ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  build-frontend:
    name: Build & Push Demo Frontend Image
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      SHORT_SHA: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          TAG="${{ github.sha }}"
          TAG="${TAG:0:7}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "image=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.image }}:latest
            ${{ steps.tag.outputs.image }}:${{ steps.tag.outputs.tag }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  deploy:
    name: Deploy to Dev
    needs: [detect-changes, build-api, build-frontend]
    if: always() && !cancelled() && !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install OpenShift CLI
        run: |
          curl -LO "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-client-linux.tar.gz"
          tar -xvzf openshift-client-linux.tar.gz
          sudo mv oc /usr/local/bin/
          rm -f openshift-client-linux.tar.gz

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Log into OpenShift
        run: |
          for i in {1..10}; do
            echo "Attempt $i: Logging into OpenShift..."
            oc login --server=${{ secrets.OPENSHIFT_URL }} --token=${{ secrets.OPENSHIFT_TOKEN }} --insecure-skip-tls-verify=true && (oc project ${{ env.OPENSHIFT_NAMESPACE_DEV }} || true) && echo "✓ Successfully logged in!" && exit 0 || {
              echo "Attempt $i failed. Retrying in 15 seconds..."
              sleep 15
            }
          done
          echo "❌ Failed to log into OpenShift after 10 attempts."
          exit 1

      - name: Determine tag for deployment
        id: deploy-tags
        run: |
          API_TAG="${{ needs.build-api.outputs.SHORT_SHA }}"
          if [ -z "$API_TAG" ]; then
            API_TAG="latest"
          fi
          FRONTEND_TAG="${{ needs.build-frontend.outputs.SHORT_SHA }}"
          if [ -z "$FRONTEND_TAG" ]; then
            FRONTEND_TAG="latest"
          fi
          echo "api_tag=$API_TAG" >> "$GITHUB_OUTPUT"
          echo "frontend_tag=$FRONTEND_TAG" >> "$GITHUB_OUTPUT"

      - name: Deploy with Helm
        run: |
          STATUS=$(helm status ${{ env.HELM_RELEASE }} -n ${{ env.OPENSHIFT_NAMESPACE_DEV }} -o json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin).get('info',{}).get('status',''))" 2>/dev/null || echo "")
          if [[ "$STATUS" == "pending-upgrade" || "$STATUS" == "pending-install" ]]; then
            echo "Release stuck in $STATUS — rolling back before upgrade"
            helm rollback ${{ env.HELM_RELEASE }} -n ${{ env.OPENSHIFT_NAMESPACE_DEV }} || true
          fi
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm \
            --namespace ${{ env.OPENSHIFT_NAMESPACE_DEV }} \
            --values ./helm/values-dev.yaml \
            --set api.image.tag=${{ steps.deploy-tags.outputs.api_tag }} \
            --set worker.image.tag=${{ steps.deploy-tags.outputs.api_tag }} \
            --set frontend.image.tag=${{ steps.deploy-tags.outputs.frontend_tag }} \
            --wait --timeout=10m --cleanup-on-fail

      - name: Verify deployment
        run: |
          echo "Verifying eagle-demi-api deployment..."
          oc rollout status deployment/${{ env.HELM_RELEASE }}-api \
            -n ${{ env.OPENSHIFT_NAMESPACE_DEV }} --timeout=10m
          echo "✓ eagle-demi-api healthy"

          if oc get deployment/${{ env.HELM_RELEASE }}-frontend -n ${{ env.OPENSHIFT_NAMESPACE_DEV }} >/dev/null 2>&1; then
            echo "Verifying eagle-demi-frontend deployment..."
            oc rollout status deployment/${{ env.HELM_RELEASE }}-frontend \
              -n ${{ env.OPENSHIFT_NAMESPACE_DEV }} --timeout=10m
            echo "✓ eagle-demi-frontend healthy"
          fi

          echo ""
          echo "Pods:"
          oc get pods -n ${{ env.OPENSHIFT_NAMESPACE_DEV }} \
            -l app.kubernetes.io/instance=${{ env.HELM_RELEASE }}
