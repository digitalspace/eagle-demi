# =============================================================================
# Deploy to Prod
# =============================================================================
# Manual workflow — triggered via workflow_dispatch with an image version tag.
# Requires GitHub environment "production" approval gate before deploying.
# Deploys/upgrades the custom Node.js api and worker image release.
# =============================================================================

name: Deploy to Prod

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'eagle-demi Node image version tag to deploy (e.g. v2.5.7)'
        required: true
        default: 'v2.5.7'

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

env:
  OPENSHIFT_NAMESPACE_PROD: 6cdc9e-prod
  HELM_RELEASE: eagle-demi

jobs:
  deploy:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install OpenShift CLI
        run: |
          curl -LO "https://mirror.openshift.com/pub/openshift-v4/clients/ocp/latest/openshift-client-linux.tar.gz"
          tar -xvzf openshift-client-linux.tar.gz
          sudo mv oc /usr/local/bin/
          rm -f openshift-client-linux.tar.gz

      - name: Install Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm version

      - name: Log into OpenShift
        run: oc login --token=${{ secrets.OPENSHIFT_TOKEN }} --server=${{ secrets.OPENSHIFT_URL }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./helm \
            --namespace ${{ env.OPENSHIFT_NAMESPACE_PROD }} \
            --values ./helm/values-prod.yaml \
            --set api.image.tag=${{ github.event.inputs.version }} \
            --set worker.image.tag=${{ github.event.inputs.version }} \
            --wait --timeout=10m

      - name: Verify deployment
        run: |
          echo "Verifying eagle-demi-api deployment..."
          oc rollout status deployment/${{ env.HELM_RELEASE }}-api \
            -n ${{ env.OPENSHIFT_NAMESPACE_PROD }} --timeout=10m
          echo "✓ eagle-demi healthy"

          echo ""
          echo "Pods:"
          oc get pods -n ${{ env.OPENSHIFT_NAMESPACE_PROD }} \
            -l app.kubernetes.io/instance=${{ env.HELM_RELEASE }}
