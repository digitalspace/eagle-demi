# Default values for the eagle-demi service.
# Override in values-{env}.yaml for environment-specific settings.
# Tear down: helm uninstall eagle-demi -n <namespace>

# Override the full resource name so Service is reachable as
# http://eagle-demi:5001 from within the cluster.
fullnameOverride: eagle-demi

# ---------------------------------------------------------------------------
# Docker image — upstream docling-serve CPU image (no custom build)
# ---------------------------------------------------------------------------
image:
  repository: ghcr.io/docling-project/docling-serve-cpu
  tag: "v1.21.0"
  pullPolicy: IfNotPresent

replicaCount: 1

# ---------------------------------------------------------------------------
# Service — ClusterIP only.  eagle-demi is cluster-internal; no Route.
# eagle-api calls http://eagle-demi:5001/v1/convert/...
# ---------------------------------------------------------------------------
service:
  port: 5001

# ---------------------------------------------------------------------------
# API key — must be pre-created before deploying:
#   oc create secret generic eagle-demi-api-key \
#     --from-literal=DOCLING_SERVE_API_KEY=<strong-random-key> \
#     -n <namespace>
#
# eagle-api reads this same key via its own secret ref and passes it as the
# X-Api-Key header on every request to docling-serve.
# ---------------------------------------------------------------------------
apiKeySecret:
  name: eagle-demi-api-key
  key: DOCLING_SERVE_API_KEY

# ---------------------------------------------------------------------------
# docling-serve runtime configuration
# See: https://github.com/docling-project/docling-serve/blob/main/docs/configuration.md
# ---------------------------------------------------------------------------
config:
  # Processing limits
  maxFileSize: "104857600"      # DOCLING_SERVE_MAX_FILE_SIZE (bytes; 100 MB = 104857600)
  maxDocumentTimeout: "300"     # DOCLING_SERVE_MAX_DOCUMENT_TIMEOUT (seconds; 5 min)
  maxNumPages: "1000"           # DOCLING_SERVE_MAX_NUM_PAGES — per-request page cap.
                                # NOT "0": in docling v1.21.0, 0 rejects every doc as
                                # exceeding the limit ("is not valid"). Node pre-splits
                                # PDFs to <=10 pages, so any value >=10 is sufficient.
  maxSyncWait: "280"            # DOCLING_SERVE_MAX_SYNC_WAIT (seconds)
                                # Must be < eagle-api AbortSignal.timeout (300s)

  # Engine tuning
  device: "cpu"                 # DOCLING_DEVICE (cpu | cuda | mps)
  defaultOcrEngine: "rapidocr"  # DOCLING_SERVE_DEFAULT_OCR_ENGINE (rapidocr | tesseract)
                                # RapidOCR = PP-OCR ONNX models, CPU-friendly, bundled in image
  numThreads: "4"               # DOCLING_NUM_THREADS (torch CPU threads)
  numWorkers: "2"               # DOCLING_SERVE_ENG_LOC_NUM_WORKERS
  shareModels: "false"          # DOCLING_SERVE_ENG_LOC_SHARE_MODELS — share one model copy
                                # across all workers; set true on memory-constrained nodes
  pageBatchSize: "4"            # DOCLING_PERF_PAGE_BATCH_SIZE — pages per inference batch

  # Security
  enableRemoteServices: "false" # DOCLING_SERVE_ENABLE_REMOTE_SERVICES (disable Azure/VLM)
  corsOrigins: "[]"             # DOCLING_SERVE_CORS_ORIGINS (cluster-internal; restrict)

  # Observability
  logFormat: "json"             # DOCLING_SERVE_LOG_FORMAT (text | json)
  logLevel: "INFO"              # DOCLING_SERVE_LOG_LEVEL (DEBUG | INFO | WARNING)
  enablePrometheus: "true"      # DOCLING_SERVE_OTEL_ENABLE_PROMETHEUS

# ---------------------------------------------------------------------------
# Compute engine — "local" or "rq"
# "local"  uses in-process threads (default; no Redis required)
# "rq"     uses Redis Queue workers (separate pods with bounded memory per doc)
# ---------------------------------------------------------------------------
engine:
  kind: "local"   # Override to "rq" in values-dev.yaml / values-prod.yaml

# ---------------------------------------------------------------------------
# RQ engine configuration (only used when engine.kind == "rq")
# Pre-create the Redis secret before deploying:
#   oc create secret generic eagle-demi-redis \
#     --from-literal=REDIS_PASSWORD=<strong-random-password> \
#     -n <namespace>
# ---------------------------------------------------------------------------
rq:
  enabled: false

  redis:
    # Internal service name; workers and API pod address redis via this host
    host: "eagle-demi-redis"
    port: 6373
    image: "redis:7-alpine"
    secretName: "eagle-demi-redis"
    passwordKey: "REDIS_PASSWORD"
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "200m"
        memory: "256Mi"

  # Results / pub-sub configuration
  resultsTtl: "14400"          # seconds (4 hours)
  maxConnections: "50"         # Redis connection pool size (50 = fine for 1-4 workers)

  # Worker pods (docling-serve rq-worker)
  # Each worker loads its own model copy and processes one document at a time.
  worker:
    replicas: 1
    resources:
      requests:
        cpu: "500m"
        memory: "5Gi"
      limits:
        cpu: "2000m"
        memory: "8Gi"
    # Worker-specific docling pipeline tuning
    queueMaxSize: "4"          # DOCLING_SERVE_QUEUE_MAX_SIZE  — preprocess lookahead (pages)
    pageBatchSize: "1"         # DOCLING_PERF_PAGE_BATCH_SIZE   — inference batch (pages)
    ocrBatchSize: "4"          # DOCLING_SERVE_OCR_BATCH_SIZE
    layoutBatchSize: "4"       # DOCLING_SERVE_LAYOUT_BATCH_SIZE
    numThreads: "2"            # DOCLING_NUM_THREADS

# ---------------------------------------------------------------------------
# Resource limits — generous memory needed for ML model weights (~4.4 GB image)
# ---------------------------------------------------------------------------
resources:
  requests:
    cpu: "500m"
    memory: "3Gi"
  limits:
    cpu: "2000m"
    memory: "6Gi"

# ---------------------------------------------------------------------------
# Health probes — docling-serve exposes /health on the same port
# ---------------------------------------------------------------------------
probes:
  # Startup probe allows time for model loading before liveness kicks in
  startup:
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 60    # 10-minute budget for cold start (60 * 10s)
  liveness:
    initialDelaySeconds: 0
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 0
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Extraction worker (CronJob)
# Runs extract.js — downloads documents from MinIO, sends to docling-serve,
# writes DocumentChunks to MongoDB.
# ---------------------------------------------------------------------------
worker:
  enabled: true

  image:
    repository: ghcr.io/digitalspace/eagle-demi-api
    tag: "latest"
    pullPolicy: Always

  # Cron schedule (default: 2 AM nightly)
  schedule: "0 2 * * *"

  # --retry-failed: re-extract documents that errored on a previous run
  retryFailed: false

  # Resource limits (worker is CPU/memory light; no ML model weights)
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  # MongoDB connection — must match eagle-api MongoDB secret
  mongoSecret:
    name: eagle-api-mongodb
    usernameKey: MONGODB_USER
    passwordKey: MONGODB_PASSWORD

  # MinIO connection secret
  minioSecret:
    name: eagle-api-minio-keys
    hostKey: MINIO_HOST
    accessKeyKey: MINIO_ACCESS_KEY
    secretKeyKey: MINIO_SECRET_KEY
    bucketKey: MINIO_BUCKET_NAME

  env:
    MONGODB_HOST:     "eagle-api-mongodb"
    MONGODB_PORT:     "27017"
    MONGODB_DATABASE: "epic"
    MONGODB_AUTHSOURCE: "admin"
    MINIO_PORT:       "443"
    MINIO_USE_SSL:    "true"
    DOCLING_URL:      "http://eagle-demi:5001"
    DOCLING_TIMEOUT_MS: "300000"
    MAX_CHUNK_SIZE:   "4000"
    MIN_CHUNK_SIZE:   "100"
    OVERLAP_SIZE:     "200"
    BATCH_SIZE:       "50"

# ---------------------------------------------------------------------------
# Central DEMI Express API (demi-api)
# Runs app.js/server.js — connects to Central MongoDB and handles spatial/CRUD.
# ---------------------------------------------------------------------------
api:
  enabled: true
  replicaCount: 1

  image:
    repository: ghcr.io/digitalspace/eagle-demi-api
    tag: "latest"
    pullPolicy: Always

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

  route:
    enabled: true
    host: ""
    path: ""
    tls:
      termination: "edge"
      insecureEdgeTerminationPolicy: "Redirect"

# ---------------------------------------------------------------------------
# KEDA autoscaling for rq-worker (scale-to-zero on idle).
# Disabled by default; enable per-env ONLY where the keda.sh CRDs are installed
# (verify: `oc get scaledobjects.keda.sh -n <namespace>`).
# When enabled, KEDA owns the worker replica count — the static replicas field
# on the worker Deployment is omitted so the two don't fight.
# ---------------------------------------------------------------------------
keda:
  enabled: false
  minReplicaCount: 0
  maxReplicaCount: 1
  pollingInterval: 15            # seconds between queue-length checks
  cooldownPeriod: 300            # seconds idle before scaling back to zero
  # Redis list that docling-serve RQ enqueues conversion tasks onto.
  # Confirmed from worker logs ("*** Listening on convert...") — queue is "convert",
  # stored as the Redis list "rq:queue:convert".
  listName: "rq:queue:convert"
  listLength: "1"               # target backlog per replica (scale up past this)
  # Redis password pulled from the existing rq.redis secret via TriggerAuthentication
  passwordSecretKey: "REDIS_PASSWORD"

