# Dev overrides — RQ engine, verbose logging.
image:
  tag: "v1.21.0"
  pullPolicy: Always

config:
  logLevel: "DEBUG"
  maxDocumentTimeout: "3600"   # 60 min; CPU-only, large scanned PDFs take a long time

# Switch to RQ engine — workers process docs with bounded per-pod memory
engine:
  kind: "rq"

rq:
  enabled: true
  worker:
    replicas: 1                # ignored when keda.enabled (KEDA owns replicas)
    resources:
      requests:
        cpu: "250m"            # low request fits namespace requests.cpu quota
        memory: "5Gi"          # model weights ~4.4GB must be pre-requested to schedule correctly
      limits:
        cpu: "3000m"           # burst on spare node CPU; limits don't count against requests.cpu quota
        memory: "6Gi"          # 4.4GB model + RapidOCR ONNX + in-mem PDF batch buffer
    queueMaxSize: "4"          # cap preprocess lookahead — limits RAM from staged page bitmaps
    pageBatchSize: "1"         # 1 page per inference pass — minimum peak tensor RAM
    tmpSizeLimit: "2Gi"        # emptyDir scratch for staged page-batch files

# KEDA: CRDs are installed in 6cdc9e-dev but no operator reconciles ScaledObjects
# (conditions stay Ready=Unknown, no HPA created). Left disabled until the KEDA
# operator is confirmed running in the namespace — worker then runs pinned at
# replicas: 1 (250m req fits dev quota). Flip to true once KEDA reconciles.
keda:
  enabled: false
  minReplicaCount: 0
  maxReplicaCount: 1

# API pod — NO models loaded in RQ mode; lightweight HTTP + Redis client only
resources:
  requests:
    cpu: "50m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

# API pod startup probe: model loading happens in workers, not API pod
# Startup can be near-instant with LOAD_MODELS_AT_BOOT=false
probes:
  startup:
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 12       # 1-minute budget (was 10 min for model loading)
