# Dev overrides — more verbose logging, smaller resource requests.
image:
  tag: "v1.21.0"
  pullPolicy: Always

config:
  logLevel: "DEBUG"
  maxDocumentTimeout: "280"    # CPU-only: large PDFs can take 3-4 min; must match maxSyncWait
  numWorkers: "1"              # 1 worker = only one set of page inference tensors active at once
                               # Model still loads once (shareModels=true), no concurrency overhead
  shareModels: "true"          # DOCLING_SERVE_ENG_LOC_SHARE_MODELS — single model copy (~4.4GB)
  pageBatchSize: "1"           # DOCLING_PERF_PAGE_BATCH_SIZE — smallest batch, minimum peak tensor RAM
  numThreads: "2"              # DOCLING_NUM_THREADS — fewer parallel CPU threads

resources:
  requests:
    cpu: "250m"
    memory: "5Gi"    # model weights ~4.4GB + PyTorch overhead; must pre-request enough to schedule
  limits:
    cpu: "2000m"
    memory: "8Gi"    # 4.4GB weights + ~1GB PyTorch/runtime + ~1GB inference headroom
