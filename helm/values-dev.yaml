# Dev overrides — more verbose logging, smaller resource requests.
image:
  tag: "v1.21.0"
  pullPolicy: Always

config:
  logLevel: "DEBUG"
  maxDocumentTimeout: "280"    # CPU-only: large PDFs can take 3-4 min; must match maxSyncWait
  numWorkers: "2"              # keep 2 workers but share models (see shareModels)
  shareModels: "true"          # DOCLING_SERVE_ENG_LOC_SHARE_MODELS — single model copy shared
                               # across workers: ~4.4GB instead of ~8.8GB; prevents OOMKill
  pageBatchSize: "2"           # DOCLING_PERF_PAGE_BATCH_SIZE — lower peak memory per batch (default 4)
  numThreads: "2"              # DOCLING_NUM_THREADS — fewer parallel CPU threads → less memory pressure

resources:
  requests:
    cpu: "250m"
    memory: "2Gi"
  limits:
    cpu: "2000m"
    memory: "6Gi"
