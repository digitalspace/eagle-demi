# Production environment overrides for eagle-demi
image:
  tag: "v1.21.0"
  pullPolicy: IfNotPresent

config:
  logLevel: "WARN"
  maxDocumentTimeout: "3600"

mongodb:
  enabled: true
  existingSecret: true
  secretName: "eagle-demi-mongodb"

engine:
  kind: "rq"

rq:
  enabled: true
  worker:
    replicas: 2
    resources:
      requests:
        cpu: "500m"
        memory: "5Gi"
      limits:
        cpu: "4000m"
        memory: "8Gi"

resources:
  requests:
    cpu: "100m"
    memory: "512Mi"
  limits:
    cpu: "1000m"
    memory: "1Gi"

api:
  image:
    repository: ghcr.io/digitalspace/eagle-demi-api
    tag: stable
    pullPolicy: IfNotPresent

worker:
  image:
    repository: ghcr.io/digitalspace/eagle-demi-api
    tag: stable
    pullPolicy: IfNotPresent
