# Allow only eagle-api pods to reach eagle-demi (docling-serve) on port 5000.
# All other ingress is denied by default (OpenShift default-deny).
#
# eagle-api pods carry the label role: api-eagle-epic (set in their Helm chart).
# eagle-demi pods carry the label role: demi-eagle-epic (set in deployment.yaml).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eagle-epic-allow-api-to-demi
  labels:
    {{- include "eagle-demi.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      role: demi-eagle-epic
  policyTypes:
    - Ingress
  ingress:
    - from:
        # eagle-api pods only
        - podSelector:
            matchLabels:
              role: api-eagle-epic
      ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
{{- if .Values.rq.enabled }}
---
# Allow RQ workers to connect to Redis.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: eagle-demi-allow-workers-to-redis
  labels:
    {{- include "eagle-demi.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      role: demi-redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        # RQ worker pods
        - podSelector:
            matchLabels:
              role: demi-rq-worker
        # API pod (dispatches jobs, reads results)
        - podSelector:
            matchLabels:
              role: demi-eagle-epic
      ports:
        - port: {{ .Values.rq.redis.port }}
          protocol: TCP
{{- end }}
