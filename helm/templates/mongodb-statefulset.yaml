{{- if .Values.mongodb.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Values.mongodb.secretName }}
  labels:
    {{- include "eagle-demi.labels" . | nindent 4 }}
spec:
  serviceName: {{ .Values.mongodb.secretName }}
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Values.mongodb.secretName }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Values.mongodb.secretName }}
    spec:
      containers:
        - name: mongodb
          image: {{ .Values.mongodb.image | quote }}
          imagePullPolicy: {{ .Values.mongodb.imagePullPolicy | default "IfNotPresent" | quote }}
          ports:
            - containerPort: 27017
              name: mongodb
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mongodb.secretName }}
                  key: {{ .Values.mongodb.usernameKey }}
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mongodb.secretName }}
                  key: {{ .Values.mongodb.passwordKey }}
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mongodb.secretName }}
                  key: {{ .Values.mongodb.databaseKey }}
          resources:
            {{- toYaml .Values.mongodb.resources | nindent 12 }}
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          readinessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 27017
            initialDelaySeconds: 10
            periodSeconds: 20
      volumes:
        - name: mongodb-data
          {{- if .Values.mongodb.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.mongodb.secretName }}-pvc
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
