# ClusterIP service — eagle-demi is cluster-internal only (no Route).
# eagle-api calls: http://eagle-demi:5000/v1/convert/...
apiVersion: v1
kind: Service
metadata:
  name: {{ include "eagle-demi.fullname" . }}
  labels:
    {{- include "eagle-demi.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "eagle-demi.selectorLabels" . | nindent 4 }}
