<!-- Header -->
<header>
  <div class="brand">
    <div class="brand-logo">
      <i class="fa-solid fa-server"></i>
    </div>
    <div>
      <div class="brand-title">DEMI Digital File Library & Registry</div>
      <div style="font-size: 0.75rem; color: var(--bc-gold)">Digital File Library (DFL) & Document Registry</div>
    </div>
  </div>

  <!-- Navigation Switcher Tabs (Center) -->
  <div class="nav-tabs">
    <button class="nav-tab" routerLink="/map" routerLinkActive="active">
      <i class="fa-solid fa-earth-americas"></i> Map Explorer
    </button>
    <button class="nav-tab" routerLink="/search" routerLinkActive="active">
      <i class="fa-solid fa-magnifying-glass"></i> Deep Text Search
    </button>
    @if (service.currentRole() === 'admin') {
      <button class="nav-tab" routerLink="/intake" routerLinkActive="active">
        <i class="fa-solid fa-cloud-arrow-up"></i> Document Intake
      </button>
    }
    <button class="nav-tab" (click)="openSwagger()">
      <i class="fa-solid fa-code"></i> Swagger API Docs
    </button>
  </div>

  <div style="display: flex; align-items: center; gap: 1.25rem;">
    <!-- Interactive Role Segment Control -->
    <div style="display: flex; background: rgba(0, 0, 0, 0.15); padding: 0.25rem; border-radius: 9999px; border: 1px solid rgba(255, 255, 255, 0.15);">
      <button 
        class="toggle-btn"
        [class.active]="service.currentRole() === 'admin'"
        (click)="setDemoRole('admin')"
      >
        <i class="fa-solid fa-shield-halved"></i> EPIC Staff View
      </button>
      <button 
        class="toggle-btn"
        [class.active]="service.currentRole() === 'public'"
        (click)="setDemoRole('public')"
      >
        <i class="fa-solid fa-globe"></i> Public Citizen View
      </button>
    </div>
    
    <!-- Keycloak SSO Identity HUD -->
    @if (service.authEnabled() && service.isAuthenticated()) {
      <div class="user-identity-badge">
        <i class="fa-solid fa-user-check"></i>
        <span>Logged in as <strong>{{ service.userName() }}</strong> @if (service.isUnauthorized()) { <span style="color: #ff4d4f; font-weight: bold;">(Unauthorized)</span> } @else { (Staff) }</span>
      </div>
      <button class="btn-logout" (click)="logout()">
        <i class="fa-solid fa-sign-out-alt"></i> Logout
      </button>
    }
  </div>
</header>

<router-outlet></router-outlet>
