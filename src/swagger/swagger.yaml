openapi: 3.0.3
info:
  title: DEMI Central Repository API (demi-api)
  description: Central authoritative storage and spatial search engine for projects, documents, and administrative region boundaries.
  version: 1.0.0
paths:
  /api/admin/logs:
    get:
      summary: Retrieve application logs
      description: Returns structured application logs from the MongoDB Capped Collection. Restricted to administrators.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: level
          in: query
          required: false
          description: Filter logs by severity level (error, warn, info, debug).
          schema:
            type: string
        - name: requestId
          in: query
          required: false
          description: Filter logs by request trace ID.
          schema:
            type: string
        - name: search
          in: query
          required: false
          description: Regex text search within log messages.
          schema:
            type: string
        - name: limit
          in: query
          required: false
          description: Number of log entries to retrieve (default is 100, max is 1000).
          schema:
            type: integer
        - name: sort
          in: query
          required: false
          description: Sort direction (-1 for newest first, 1 for oldest first).
          schema:
            type: string
      responses:
        '200':
          description: Structured log response.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
                        level:
                          type: string
                        message:
                          type: string
                        requestId:
                          type: string
                        meta:
                          type: object
                        stack:
                          type: string
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden. Insufficient roles.

  /api/search:
    get:
      summary: Search document content
      description: Queries the Typesense search engine for matching text chunks within documents.
      parameters:
        - name: q
          in: query
          required: true
          description: Search query string.
          schema:
            type: string
        - name: project
          in: query
          required: false
          description: Filter results by project ID.
          schema:
            type: string
      responses:
        '200':
          description: Search results containing matched chunks and metadata.
        '400':
          description: Missing search query parameter.

  /api/projects:
    get:
      summary: Retrieve projects
      description: Get all projects, optionally filtered by spatial administrative region containment. Restricted to published projects for unauthenticated public requests.
      parameters:
        - name: region
          in: query
          required: false
          description: Name of the region shapefile boundary to execute point-in-polygon containment check.
          schema:
            type: string
      responses:
        '200':
          description: A list of projects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
    post:
      summary: Create project
      description: Ingest a new project with name and geographic centroid coordinates.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectInput'
      responses:
        '201':
          description: Project successfully created.
        '400':
          description: Missing required fields.
        '401':
          description: Unauthorized.
        '403':
          description: Forbidden. Insufficient roles.

  /api/projects/{id}:
    get:
      summary: Get project by ID
      description: Get details of a single project. Returns 404 to unauthenticated users if unpublished.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project document.
        '404':
          description: Project not found.
    put:
      summary: Update project
      description: Modify metadata, coordinates, or publication state of an existing project.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectInput'
      responses:
        '200':
          description: Project successfully updated.
        '401':
          description: Unauthorized.
        '404':
          description: Project not found.
    delete:
      summary: Delete project
      description: Permanently remove a project from the master directory.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Project successfully deleted.
        '401':
          description: Unauthorized.
        '404':
          description: Project not found.

  /api/documents:
    get:
      summary: Retrieve documents
      description: Get all documents, optionally filtered by spatial administrative region of their parent project. Restricts to published documents for unauthenticated public requests.
      parameters:
        - name: region
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: A list of documents.
    post:
      summary: Create document
      description: Register document metadata record in the database.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentInput'
      responses:
        '201':
          description: Document successfully created.
        '401':
          description: Unauthorized.

  /api/documents/extract:
    post:
      summary: Upload and extract document
      description: Uploads document file to S3 MinIO and queues/processes text extraction.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                upfile:
                  type: string
                  format: binary
                project:
                  type: string
                displayName:
                  type: string
      responses:
        '200':
          description: Document successfully uploaded and parsed.
        '401':
          description: Unauthorized.

  /api/documents/{id}:
    get:
      summary: Get document by ID
      description: Retrieve details of a single document.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document successfully retrieved.
        '404':
          description: Document not found.
    put:
      summary: Update document
      description: Modify document metadata, parent project reference, or publication state.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentInput'
      responses:
        '200':
          description: Document successfully updated.
        '401':
          description: Unauthorized.
    delete:
      summary: Delete document
      description: Delete a document and its parsed chunks.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document successfully deleted.
        '401':
          description: Unauthorized.

  /api/regions:
    get:
      summary: Retrieve regions
      description: Get all administrative boundary regions.
      responses:
        '200':
          description: List of region boundary shapes.
    post:
      summary: Ingest administrative region shape
      description: Create a new region boundary boundary.
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegionInput'
      responses:
        '201':
          description: Region shapefile stored successfully.
        '401':
          description: Unauthorized.

  /api/regions/{id}:
    get:
      summary: Get region by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Region document.
        '404':
          description: Region not found.
    put:
      summary: Update region
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegionInput'
      responses:
        '200':
          description: Region successfully updated.
        '401':
          description: Unauthorized.
    delete:
      summary: Delete region
      security:
        - ApiKeyAuth: []
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Region successfully deleted.
        '401':
          description: Unauthorized.

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-Api-Key
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Project:
      type: object
      properties:
        _id:
          type: string
        trackProjectId:
          type: integer
        name:
          type: string
        region:
          type: string
        centroid:
          $ref: '#/components/schemas/GeoPoint'
    
    ProjectInput:
      type: object
      required:
        - trackProjectId
        - name
        - centroid
      properties:
        trackProjectId:
          type: integer
        name:
          type: string
        region:
          type: string
        centroid:
          $ref: '#/components/schemas/GeoPoint'

    DocumentInput:
      type: object
      required:
        - project
        - displayName
        - s3Key
      properties:
        project:
          type: string
        displayName:
          type: string
        s3Key:
          type: string
        region:
          type: string
        edrmsRecordNumber:
          type: string
        orcsClassification:
          type: string

    RegionInput:
      type: object
      required:
        - name
        - geometry
      properties:
        name:
          type: string
        geometry:
          type: object
          properties:
            type:
              type: string
              enum: [Polygon, MultiPolygon]
            coordinates:
              type: array
              items:
                type: array

    GeoPoint:
      type: object
      required:
        - type
        - coordinates
      properties:
        type:
          type: string
          enum: [Point]
        coordinates:
          type: array
          minItems: 2
          maxItems: 2
          items:
            type: number
